<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Simple Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      text-align: center;
    }

    header {
      background-color: #4CAF50;
      color: white;
      padding: 20px;
    }

    main {
      padding: 40px 20px;
    }

    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background-color: #45a049;
    }

    footer {
      margin-top: 40px;
      background-color: #222;
      color: white;
      padding: 10px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome to My Website</h1>
    <p>This is a simple HTML website</p>
  </header>

  <main>
    <h2>Hello!</h2>
    <p>This is my first simple website using HTML and CSS.</p>
    <button onclick="showMessage()">Click Me</button>
    <p id="message"></p>
  </main>

  <footer>
    <p>© 2026 My Simple Website</p>
  </footer>

  <script>
    function showMessage() {
      document.getElementById("message").innerText = "You clicked the button!";
    }
  </script>

</body>
</html>
